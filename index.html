<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Myfont</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <header>
        <h1>Myfont</h1>
        <p>A custom typeface.</p>

        <div class="buttons">
            <a href="fonts/Myfont-Regular.ttf" download>Download TTF</a>
            <a href="fonts/Myfont-Regular.otf" download>Download OTF</a>
        </div>
    </header>

    <section class="hero">
        <p class="display">
            The quick brown fox jumps over the lazy dog.
        </p>
    </section>

    <section>
        <h2>Alphabet</h2>

        <div class="sample">
            ABCDEFGHIJKLMNOPQRSTUVWXYZ
            <br><br>
            abcdefghijklmnopqrstuvwxyz
            <br><br>
            0123456789
            <br><br>
            !@#$%^&*()_+-=[]{};:'",.<>/?
        </div>
    </section>

    <section>
        <h2>Live Preview</h2>

        <textarea id="preview">
Type anything here...
        </textarea>
    </section>

</div>

</body>
</html>
